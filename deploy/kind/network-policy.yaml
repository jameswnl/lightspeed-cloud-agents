# NetworkPolicy for cloud agents — restricts inter-agent traffic
# Monitoring agent can reach diagnostic agent, not vice versa.
# All agents can reach Ollama/LLM backend.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: diagnostic-agent-ingress
  labels:
    environment: cloud-agents
spec:
  podSelector:
    matchLabels:
      app: diagnostic-agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: monitoring-agent
        - podSelector:
            matchLabels:
              app: workflow-runner
      ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-agent-ingress
  labels:
    environment: cloud-agents
spec:
  podSelector:
    matchLabels:
      app: monitoring-agent
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: workflow-runner
      ports:
        - port: 8080
          protocol: TCP
---
# Egress policy for workflow runner — restrict outbound to known services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workflow-runner-egress
  labels:
    environment: cloud-agents
spec:
  podSelector:
    matchLabels:
      app: workflow-runner
  policyTypes:
    - Egress
  egress:
    # Temporal Server (gRPC)
    - ports:
        - port: 7233
          protocol: TCP
    # Sandbox pods (HTTP)
    - ports:
        - port: 8080
          protocol: TCP
    # K8s API server
    - ports:
        - port: 443
          protocol: TCP
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Egress policy for sandbox pods — restrict outbound to DNS + LLM providers
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-egress
  labels:
    environment: cloud-agents
spec:
  podSelector:
    matchLabels:
      spawned-by: workflow-runner
  policyTypes:
    - Egress
  egress:
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # MCP kubectl server (streamable HTTP)
    - to:
        - podSelector:
            matchLabels:
              app: mcp-kubectl
      ports:
        - port: 8082
          protocol: TCP
    # LLM provider endpoints (HTTPS)
    # In Kind dev environments, allow all HTTPS egress for simplicity.
    # Production deployments should use Helm with explicit llmCidrs.
    - ports:
        - port: 443
          protocol: TCP
