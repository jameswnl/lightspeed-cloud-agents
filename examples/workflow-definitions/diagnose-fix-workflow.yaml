# yaml-language-server: $schema=../../schema/workflow-definition.schema.json
apiVersion: v1
kind: AgentWorkflow
metadata:
  name: diagnose-and-fix
spec:
  steps:
    - name: diagnose
      type: agent
      prompt: "Check all hosts for issues. Report what you find."
      output_key: diagnosis
      output_schema:
        type: object
        properties:
          summary:
            type: string
          issues_found:
            type: integer
        required: [summary, issues_found]
      timeout_seconds: 120

    - name: approve-fix
      type: human-approval
      message: "Review the diagnosis and approve remediation."
      output_key: approval
      risk_level: high

    - name: fix
      type: agent
      prompt: "Fix all issues found: {{ steps.diagnosis.output.summary }}"
      output_key: fix
      condition: "steps.approval.output.approved == true"
      timeout_seconds: 180

    - name: verify
      type: agent
      prompt: "Verify the cluster is healthy after remediation."
      output_key: verification
      condition: "steps.fix.status == completed"
      timeout_seconds: 120
