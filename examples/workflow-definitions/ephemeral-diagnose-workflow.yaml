# yaml-language-server: $schema=../../schema/workflow-definition.schema.json
apiVersion: v1
kind: AgentWorkflow
metadata:
  name: ephemeral-diagnose
spec:
  steps:
    - name: diagnose
      type: agent
      prompt: "Check all hosts. Report what you find."
      output_key: diagnosis
      output_schema:
        type: object
        properties:
          summary:
            type: string
          issues_found:
            type: integer
          cluster_healthy:
            type: boolean
        required: [summary, issues_found, cluster_healthy]
      timeout_seconds: 120
