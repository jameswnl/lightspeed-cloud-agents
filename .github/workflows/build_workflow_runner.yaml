name: Build workflow-runner image

on:
  pull_request:
    paths:
      - 'deploy/workflow-runner/**'
      - 'deploy/helm/**'
      - 'src/cloud_agents/**'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches:
      - main
    paths:
      - 'deploy/workflow-runner/**'
      - 'deploy/helm/**'
      - 'src/cloud_agents/**'
      - 'pyproject.toml'
      - 'uv.lock'

env:
  IMAGE_NAME: workflow-runner
  REGISTRY: quay.io/openshift-lightspeed
  CONTAINER_FILE: deploy/workflow-runner/Containerfile

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Install qemu and buildah
        run: |
          sudo apt update
          sudo apt install -y buildah qemu-user-static
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build image with Buildah
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: |
            latest
            ${{ github.sha }}
          containerfiles: |
            ${{ env.CONTAINER_FILE }}
          archs: amd64
          oci: true
      - name: Check images
        run: |
          buildah images | grep '${{ env.IMAGE_NAME }}'

      - name: Push to registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.QUAY_USERNAME != ''
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Install cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.QUAY_USERNAME != ''
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.QUAY_USERNAME != ''
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build_image.outputs.digest }}
