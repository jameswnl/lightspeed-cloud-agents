name: Build workflow-runner image

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'deploy/workflow-runner/**'
      - 'deploy/helm/**'
      - 'src/cloud_agents/**'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches:
      - main
    paths:
      - 'deploy/workflow-runner/**'
      - 'deploy/helm/**'
      - 'src/cloud_agents/**'
      - 'pyproject.toml'
      - 'uv.lock'

env:
  IMAGE_NAME: lightspeed-cloud-agents
  REGISTRY: quay.io/jameswong
  CONTAINER_FILE: deploy/workflow-runner/Containerfile

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install qemu and buildah
        run: |
          sudo apt update
          sudo apt install -y buildah qemu-user-static
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build image with Buildah
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: |
            latest
            ${{ github.sha }}
          containerfiles: |
            ${{ env.CONTAINER_FILE }}
          archs: amd64
          oci: true
      - name: Check images
        run: |
          buildah images | grep '${{ env.IMAGE_NAME }}'

  push:
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install buildah
        run: |
          sudo apt update
          sudo apt install -y buildah qemu-user-static
      - name: Build image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: |
            latest
            ${{ github.sha }}
          containerfiles: |
            ${{ env.CONTAINER_FILE }}
          archs: amd64
          oci: true
      - name: Push to registry
        id: push_image
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.build_image.outputs.tags }}
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image with cosign
        run: |
          cosign sign --yes ${{ steps.push_image.outputs.registry-path }}@${{ steps.push_image.outputs.digest }}
